<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBot Pro | Streaming & Markdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        .chat-container { height: calc(100vh - 180px); }
        /* Markdown Styling */
        .prose h1 { font-size: 1.5rem; font-weight: bold; margin: 1rem 0; color: #60a5fa; }
        .prose h2 { font-size: 1.25rem; font-weight: bold; margin: 0.75rem 0; border-bottom: 1px solid #374151; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose p { margin-bottom: 0.75rem; line-height: 1.6; }
        .prose a { color: #3b82f6; text-decoration: underline; }
        /* Code Block Styling */
        pre { position: relative; padding-top: 2rem !important; border-radius: 8px !important; margin: 1rem 0 !important; }
        .copy-btn {
            position: absolute; top: 5px; right: 5px;
            background: #374151; color: white; padding: 2px 8px;
            border-radius: 4px; font-size: 10px; cursor: pointer; transition: 0.2s;
        }
        .copy-btn:hover { background: #4b5563; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <header class="flex justify-between items-center p-4 border-b border-gray-800 bg-gray-900 sticky top-0 z-20">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">GWM Chat Bot</h1>
        <div class="flex gap-2">
            <button id="stop-btn" onclick="stopGeneration()" class="hidden bg-red-900/50 text-red-400 px-3 py-1 rounded-lg border border-red-800 text-sm">Stop</button>
            <button onclick="toggleSettings()" class="p-2 hover:bg-gray-800 rounded-full">⚙️</button>
        </div>
    </header>

    <main id="chat-window" class="chat-container overflow-y-auto p-4 space-y-6 flex flex-col"></main>

    <footer class="fixed bottom-0 w-full p-4 bg-gray-900 border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <textarea id="user-input" rows="1" placeholder="Type your message..." 
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-medium transition">Send</button>
        </div>
    </footer>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 w-full max-w-md p-6 rounded-2xl border border-gray-700">
            <h2 class="text-xl font-bold mb-4 text-blue-400">Settings</h2>
            <label class="block text-sm text-gray-400 mb-1">OpenRouter API Key</label>
            <input type="password" id="api-key" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mb-4 text-sm">
            <label class="block text-sm text-gray-400 mb-1">Model ID</label>
            <input type="text" id="model-id" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mb-4 text-sm">
            <label class="block text-sm text-gray-400 mb-1">System Prompt</label>
            <textarea id="system-prompt" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mb-6 text-sm"></textarea>
            <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-bold transition">Save & Close</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        let messages = [];
        let controller; // For stopping the stream

        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('or-api-key') || '';
            document.getElementById('model-id').value = localStorage.getItem('or-model') || 'google/gemini-2.0-flash-001';
            document.getElementById('system-prompt').value = localStorage.getItem('or-system') || 'You are a helpful AI assistant.';
            appendMessage('assistant', 'Welcome! Configure your API key in settings to start streaming.');
        };

        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }

        function saveSettings() {
            localStorage.setItem('or-api-key', document.getElementById('api-key').value);
            localStorage.setItem('or-model', document.getElementById('model-id').value);
            localStorage.setItem('or-system', document.getElementById('system-prompt').value);
            toggleSettings();
        }

        function stopGeneration() { if(controller) controller.abort(); }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const key = localStorage.getItem('or-api-key');
            if(!input.value || !key) return alert("Missing API key or message!");

            const userText = input.value;
            appendMessage('user', userText);
            input.value = '';
            
            if(messages.length === 0) messages.push({role: "system", content: localStorage.getItem('or-system')});
            messages.push({role: "user", content: userText});

            // Create AI response bubble for streaming
            const aiBubble = createBubble('assistant');
            const contentDiv = aiBubble.querySelector('.prose');
            document.getElementById('stop-btn').classList.remove('hidden');

            controller = new AbortController();
            let fullAIResponse = "";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": localStorage.getItem('or-model'),
                        "messages": messages,
                        "stream": true
                    }),
                    signal: controller.signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;
                            try {
                                const data = JSON.parse(dataStr);
                                const content = data.choices[0].delta.content || "";
                                fullAIResponse += content;
                                contentDiv.innerHTML = marked.parse(fullAIResponse);
                                Prism.highlightAllUnder(contentDiv);
                                addCopyButtons(contentDiv);
                                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
                messages.push({role: "assistant", content: fullAIResponse});
            } catch (err) {
                if (err.name !== 'AbortError') contentDiv.innerHTML += `<p class="text-red-400">Error: ${err.message}</p>`;
            } finally {
                document.getElementById('stop-btn').classList.add('hidden');
            }
        }

        function createBubble(role) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `p-4 rounded-xl max-w-[90%] ${role === 'user' ? 'bg-blue-600 self-end text-white' : 'bg-gray-800 border border-gray-700 self-start text-gray-100'}`;
            div.innerHTML = `<small class="block opacity-50 mb-2 text-xs uppercase font-bold tracking-tighter">${role}</small><div class="prose">...</div>`;
            win.appendChild(div);
            return div;
        }

        function appendMessage(role, text) {
            const bubble = createBubble(role);
            bubble.querySelector('.prose').innerHTML = marked.parse(text);
            Prism.highlightAllUnder(bubble);
            addCopyButtons(bubble);
        }

        function addCopyButtons(container) {
            container.querySelectorAll('pre').forEach(block => {
                if (block.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = 'Copy';
                btn.onclick = () => {
                    navigator.clipboard.writeText(block.innerText.replace('Copy', ''));
                    btn.innerText = 'Copied!';
                    setTimeout(() => btn.innerText = 'Copy', 2000);
                };
                block.appendChild(btn);
            });
        }
    </script>
</body>
</html>
