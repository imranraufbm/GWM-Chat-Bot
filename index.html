<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Web Monster | Omega</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root { --sidebar-width: 280px; }
        body { background: #05080a; color: #e2e8f0; overflow: hidden; font-family: 'Inter', sans-serif; -webkit-text-size-adjust: 100%; }
        
        /* Typography */
        .prose h1 { font-size: 1.4rem; font-weight: 900; color: #22c55e; margin: 1rem 0; }
        .prose code { background: #1a202c; color: #4ade80; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85rem; }
        
        /* Code Block Wrapper */
        pre { position: relative !important; padding-top: 2.5rem !important; margin: 1.5rem 0 !important; border: 1px solid #22c55e33 !important; border-radius: 12px !important; }
        .code-copy-btn {
            position: absolute; top: 8px; right: 8px;
            background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44;
            padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer;
        }
        .code-copy-btn:hover { background: #22c55e44; }

        /* Sidebar & Layout */
        #sidebar { width: var(--sidebar-width); background: #0b1219; transition: transform 0.3s ease; border-right: 1px solid #22c55e22; z-index: 100; display: flex; flex-direction: column; height: 100vh; }
        .sidebar-closed { transform: translateX(-100%); }
        #history-list { flex: 1; overflow-y: auto; }
        
        #chat-window { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .header-center { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; width: 50%; }

        /* Animations */
        .mic-active { color: #ef4444 !important; filter: drop-shadow(0 0 8px #ef4444); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        
        /* Mobile Overlay */
        #overlay.active { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 90; }
        @media (max-width: 768px) { #sidebar { position: fixed; height: 100vh; } }
    </style>
</head>
<body class="flex">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="sidebar-closed md:transform-none fixed md:relative shadow-2xl">
        <div class="p-6 border-b border-green-900/20 bg-slate-900 flex justify-between items-center">
            <h2 class="font-black text-green-500 uppercase text-[10px] tracking-widest">Monster History</h2>
            <button onclick="toggleSidebar()" class="md:hidden text-white">✕</button>
        </div>
        <div class="p-4 flex-1 overflow-hidden flex flex-col">
            <button onclick="newChat()" class="w-full bg-green-600/10 border border-green-500/30 text-green-400 p-3 rounded-xl text-xs font-bold mb-4">+ New Roar</button>
            <div id="history-list" class="space-y-2 text-[11px]"></div>
        </div>
        <div class="p-4 border-t border-green-900/20 bg-slate-900/50">
            <button onclick="toggleSettings()" class="w-full p-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-[10px] text-green-500 font-black">⚙️ BRAIN SETTINGS</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative w-full overflow-hidden">
        <header class="p-4 border-b border-slate-800 bg-slate-900/80 flex justify-between items-center z-10">
            <button onclick="toggleSidebar()" class="p-2 bg-slate-800 rounded-lg text-green-500">☰</button>
            <div class="header-center">
                <h1 class="text-sm md:text-lg font-black text-green-500 uppercase tracking-tighter">Green Web Monster</h1>
                <div id="status" class="text-[7px] md:text-[9px] uppercase font-bold text-slate-500 tracking-[0.3em] transition-all">Sleeping</div>
            </div>
            <button id="voice-toggle" onclick="toggleVoiceOutput()" class="text-xl">🔊</button>
        </header>

        <div id="chat-window" class="p-4 md:p-10 space-y-6 flex flex-col pb-32"></div>

        <footer class="fixed bottom-0 left-0 md:left-[280px] right-0 p-3 bg-slate-900/95 border-t border-slate-800 z-10">
            <div class="max-w-3xl mx-auto flex gap-2 items-center bg-slate-800 p-2 rounded-2xl border border-slate-700 shadow-2xl">
                <button id="mic-btn" onclick="askMicPermission()" class="p-2 text-xl hover:text-green-500 transition">🎤</button>
                <button onclick="alert('Contact Admin for Vision Pro.')" class="p-2 text-xl opacity-30">📷</button>
                <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none focus:outline-none p-2 text-white text-sm resize-none" placeholder="Feed the beast..."></textarea>
                <button onclick="sendMessage()" id="send-btn" class="bg-green-600 hover:bg-green-500 text-white font-black py-2 px-4 rounded-xl text-xs">SEND</button>
            </div>
        </footer>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[200] p-4">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-3xl border border-green-500/30">
            <h2 class="text-xl font-black mb-6 text-green-500 uppercase">Config</h2>
            <div class="space-y-4">
                <input type="password" id="api-key" placeholder="OpenRouter API Key" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white outline-none">
                <input type="text" id="model-id" placeholder="Model ID" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white outline-none">
                <textarea id="system-prompt" rows="3" placeholder="System Persona" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white text-sm outline-none"></textarea>
                <button onclick="saveSettings()" class="w-full bg-green-600 p-4 rounded-2xl font-black text-white uppercase">Apply</button>
                <button onclick="toggleSettings()" class="w-full text-slate-600 text-[10px] mt-2">CLOSE</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        let currentChatId = null;
        let allChats = JSON.parse(localStorage.getItem('monster_chats') || '{}');
        let voiceEnabled = localStorage.getItem('monster_voice') === 'true';
        let recognition;

        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('or-api-key') || '';
            document.getElementById('model-id').value = localStorage.getItem('or-model') || 'google/gemini-2.0-flash-001';
            document.getElementById('system-prompt').value = localStorage.getItem('or-system') || 'You are the Green Web Monster.';
            updateVoiceIcon();
            refreshHistory();
            newChat();
        };

        function setStatus(text, color = "text-slate-500") {
            const s = document.getElementById('status');
            s.innerText = text;
            s.className = `text-[9px] uppercase font-bold tracking-[0.3em] mt-1 ${color}`;
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); document.getElementById('overlay').classList.toggle('active'); }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        function toggleVoiceOutput() { voiceEnabled = !voiceEnabled; localStorage.setItem('monster_voice', voiceEnabled); updateVoiceIcon(); if(!voiceEnabled) window.speechSynthesis.cancel(); }
        function updateVoiceIcon() { document.getElementById('voice-toggle').innerText = voiceEnabled ? "🔊" : "🔇"; document.getElementById('voice-toggle').style.opacity = voiceEnabled ? "1" : "0.3"; }

        function saveSettings() {
            localStorage.setItem('or-api-key', document.getElementById('api-key').value);
            localStorage.setItem('or-model', document.getElementById('model-id').value);
            localStorage.setItem('or-system', document.getElementById('system-prompt').value);
            location.reload();
        }

        // --- FIXED MIC LOGIC ---
        function askMicPermission() {
            const btn = document.getElementById('mic-btn');
            if (btn.classList.contains('mic-active')) {
                recognition.stop();
                btn.classList.remove('mic-active');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Your browser does not support voice input.");

            recognition = new SpeechRecognition();
            recognition.lang = ""; // Auto-detect
            recognition.start();

            recognition.onstart = () => btn.classList.add('mic-active');
            recognition.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                btn.classList.remove('mic-active');
            };
            recognition.onerror = () => btn.classList.remove('mic-active');
        }

        // --- MONSTER VOICE ENGINE ---
        function speak(text) {
            if (!voiceEnabled) return;
            window.speechSynthesis.cancel();
            
            const cleanText = text.replace(/[*#`_]/g, '').replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF])/g, '');
            const msg = new SpeechSynthesisUtterance(cleanText);
            
            // Language Detection & Voice Selection
            const voices = window.speechSynthesis.getVoices();
            const isUrdu = /[\u0600-\u06FF]/.test(text);
            const targetLang = isUrdu ? 'ur' : 'en';
            
            const monsterVoice = voices.find(v => v.lang.startsWith(targetLang));
            if(monsterVoice) msg.voice = monsterVoice;
            
            msg.pitch = 0.5;
            msg.rate = 1.2; // FASTER
            
            msg.onstart = () => setStatus(`Talking [${targetLang.toUpperCase()}]`, "text-green-400");
            msg.onend = () => setStatus("Sleeping");
            
            window.speechSynthesis.speak(msg);
        }

        function newChat() {
            currentChatId = 'chat_' + Date.now();
            document.getElementById('chat-window').innerHTML = '';
            appendUI('assistant', 'ROAR! Feed me data.');
            if (window.innerWidth < 768) { document.getElementById('sidebar').classList.add('sidebar-closed'); document.getElementById('overlay').classList.remove('active'); }
        }

        function refreshHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = Object.keys(allChats).reverse().map(id => `
                <div class="p-3 bg-slate-800/40 hover:bg-green-600/20 rounded-xl cursor-pointer truncate mb-2 border border-transparent hover:border-green-500/30 transition" onclick="loadChat('${id}')">
                    ${allChats[id].title}
                </div>
            `).join('');
        }

        function loadChat(id) {
            currentChatId = id; document.getElementById('chat-window').innerHTML = '';
            allChats[id].messages.forEach(m => { if(m.role !== 'system') appendUI(m.role, m.content); });
            if (window.innerWidth < 768) toggleSidebar();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const key = localStorage.getItem('or-api-key');
            if (!input.value.trim() || !key) return;
            const text = input.value;
            appendUI('user', text);
            input.value = '';
            setStatus("Thinking...", "text-blue-400");

            const history = allChats[currentChatId]?.messages || [{role: 'system', content: localStorage.getItem('or-system')}];
            history.push({role: 'user', content: text});
            const bubble = createBubble('assistant');
            const contentDiv = bubble.querySelector('.prose');
            let fullText = "";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ "model": localStorage.getItem('or-model'), "messages": history, "stream": true })
                });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    decoder.decode(value).split('\n').forEach(line => {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                fullText += data.choices[0].delta.content || "";
                                contentDiv.innerHTML = marked.parse(fullText);
                                Prism.highlightAllUnder(contentDiv);
                                injectCodeButtons(contentDiv);
                            } catch(e) {}
                        }
                    });
                    document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                }
                history.push({role: 'assistant', content: fullText});
                allChats[currentChatId] = { title: text.substring(0, 20), messages: history };
                localStorage.setItem('monster_chats', JSON.stringify(allChats));
                refreshHistory();
                addCopy(bubble, fullText);
                speak(fullText);
            } catch (err) { contentDiv.innerText = "Error: " + err.message; setStatus("Sleeping"); }
        }

        function createBubble(role) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl max-w-[92%] md:max-w-[75%] ${role === 'user' ? 'bg-green-600 text-white self-end ml-auto' : 'bg-slate-800 border border-slate-700 self-start'}`;
            div.innerHTML = `<small class="block text-[8px] font-black opacity-30 mb-1 uppercase tracking-tighter">${role}</small><div class="prose text-sm"></div>`;
            document.getElementById('chat-window').appendChild(div);
            return div;
        }

        function appendUI(role, text) {
            const bubble = createBubble(role);
            bubble.querySelector('.prose').innerHTML = marked.parse(text);
            if(role === 'assistant') { addCopy(bubble, text); injectCodeButtons(bubble); }
            Prism.highlightAllUnder(bubble);
        }

        function injectCodeButtons(container) {
            container.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.code-copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'code-copy-btn';
                btn.innerText = 'COPY CODE';
                btn.onclick = () => {
                    navigator.clipboard.writeText(pre.querySelector('code').innerText);
                    btn.innerText = 'COPIED!';
                    setTimeout(() => btn.innerText = 'COPY CODE', 2000);
                };
                pre.appendChild(btn);
            });
        }

        function addCopy(bubble, text) {
            if (bubble.querySelector('.wisdom-btn')) return;
            const btn = document.createElement('div');
            btn.className = 'wisdom-btn mt-3 text-[9px] text-green-500 font-bold cursor-pointer uppercase tracking-widest';
            btn.innerText = '📋 Copy Monster Wisdom';
            btn.onclick = () => { navigator.clipboard.writeText(text); btn.innerText = '✅ Saved!'; };
            bubble.appendChild(btn);
        }
    </script>
</body>
</html>
