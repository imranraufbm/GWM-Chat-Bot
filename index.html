<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Web Monster Chat Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root { --sidebar-width: 280px; }
        body { background: #060a0f; color: #e2e8f0; overflow: hidden; }
        
        /* Markdown Styling - Critical Fix */
        .prose h1 { font-size: 1.6rem; font-weight: bold; color: #22c55e; margin: 1rem 0; }
        .prose h2 { font-size: 1.3rem; font-weight: bold; color: #4ade80; margin: 0.8rem 0; border-bottom: 1px solid #1e293b; }
        .prose p { margin-bottom: 0.8rem; line-height: 1.6; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose strong { color: #22c55e; }
        .prose code { background: #1e293b; padding: 2px 4px; border-radius: 4px; color: #4ade80; }
        
        /* Layout Fixes */
        #sidebar { 
            width: var(--sidebar-width); 
            background: #0f172a; 
            transition: transform 0.3s ease; 
            border-right: 1px solid #22c55e33;
            z-index: 100;
        }
        .sidebar-closed { transform: translateX(-100%); }
        
        #chat-window { height: calc(100vh - 140px); overflow-y: auto; scroll-behavior: smooth; }

        /* Copy Button Fix - Now at bottom of response */
        .copy-trigger {
            margin-top: 10px;
            font-size: 12px;
            color: #22c55e;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            opacity: 0.7;
        }
        .copy-trigger:hover { opacity: 1; text-decoration: underline; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100vh; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body class="flex">

    <aside id="sidebar" class="sidebar-closed md:transform-none fixed md:relative flex flex-col h-full shadow-2xl">
        <div class="p-4 border-b border-green-900/30 flex justify-between items-center">
            <h2 class="font-bold text-green-500">History</h2>
            <button onclick="toggleSidebar()" class="md:hidden text-white text-xl">✕</button>
        </div>
        <div class="p-4">
            <button onclick="newChat()" class="w-full bg-green-600/20 border border-green-500/50 hover:bg-green-600/40 p-2 rounded-lg text-green-400 transition mb-4">
                + New Monster Chat
            </button>
            <div id="history-list" class="space-y-2 overflow-y-auto max-h-[70vh]"></div>
        </div>
        <div class="mt-auto p-4 border-t border-green-900/30">
            <button onclick="toggleSettings()" class="w-full text-left text-xs text-slate-400 hover:text-green-400">⚙ Settings & API</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen relative w-full">
        <header class="p-4 border-b border-slate-800 bg-slate-900/80 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 bg-slate-800 rounded-lg text-green-500">☰</button>
                <h1 class="text-xl font-black tracking-tighter text-green-500 uppercase">Green Web Monster</h1>
            </div>
            <div id="status" class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Sleeping</div>
        </header>

        <div id="chat-window" class="p-4 md:p-8 space-y-8 flex flex-col">
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-green-900/20 max-w-2xl">
                <h3 class="text-green-500 font-bold mb-2">ROAR! I am the Green Web Monster.</h3>
                <p class="text-slate-400 text-sm">Feed me prompts and I will generate wisdom. Ensure your API key is set in the gear icon below.</p>
            </div>
        </div>

        <footer class="p-4 bg-slate-900 border-t border-slate-800">
            <div class="max-w-4xl mx-auto flex gap-2 items-center bg-slate-800 p-2 rounded-2xl border border-slate-700">
                <label class="cursor-pointer p-2 hover:bg-slate-700 rounded-xl transition">
                    📷<input type="file" id="file-input" class="hidden" onchange="handleImage(this)">
                </label>
                <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none focus:outline-none p-2 text-white resize-none" placeholder="Message the monster..."></textarea>
                <button onclick="sendMessage()" id="send-btn" class="bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-6 rounded-xl transition">SEND</button>
            </div>
        </footer>
    </main>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-3xl border border-green-500/30 shadow-[0_0_50px_rgba(34,197,94,0.1)]">
            <h2 class="text-2xl font-bold mb-6 text-green-500">Monster Brain Settings</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">OpenRouter API Key</label>
                    <input type="password" id="api-key" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mt-1 outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Model ID</label>
                    <input type="text" id="model-id" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mt-1 outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-500 font-bold">Monster Personality</label>
                    <textarea id="system-prompt" rows="3" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 mt-1 outline-none focus:border-green-500 text-sm"></textarea>
                </div>
                <button onclick="saveSettings()" class="w-full bg-green-600 p-4 rounded-2xl font-black text-white hover:bg-green-500 transition shadow-lg shadow-green-900/20">SAVE CHANGES</button>
                <button onclick="toggleSettings()" class="w-full text-slate-500 text-sm">Close</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        let currentChatId = null;
        let allChats = JSON.parse(localStorage.getItem('monster_chats') || '{}');
        let currentImages = [];

        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('or-api-key') || '';
            document.getElementById('model-id').value = localStorage.getItem('or-model') || 'google/gemini-2.0-flash-001';
            document.getElementById('system-prompt').value = localStorage.getItem('or-system') || 'You are the Green Web Monster, a powerful and wise AI.';
            refreshHistoryList();
            newChat();
        };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('sidebar-closed'); }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }

        function saveSettings() {
            localStorage.setItem('or-api-key', document.getElementById('api-key').value);
            localStorage.setItem('or-model', document.getElementById('model-id').value);
            localStorage.setItem('or-system', document.getElementById('system-prompt').value);
            toggleSettings();
            location.reload();
        }

        function newChat() {
            currentChatId = 'chat_' + Date.now();
            document.getElementById('chat-window').innerHTML = '';
            if(window.innerWidth < 768) toggleSidebar();
        }

        function refreshHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = Object.keys(allChats).reverse().map(id => `
                <div class="p-3 bg-slate-800/50 hover:bg-green-900/20 rounded-xl cursor-pointer text-sm border border-transparent hover:border-green-500/30 transition flex justify-between group" onclick="loadChat('${id}')">
                    <span class="truncate">${allChats[id].title}</span>
                    <button onclick="deleteChat(event, '${id}')" class="opacity-0 group-hover:opacity-100 text-red-500">✕</button>
                </div>
            `).join('');
        }

        function loadChat(id) {
            currentChatId = id;
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            allChats[id].messages.forEach(m => {
                if(m.role !== 'system') appendUI(m.role, m.content);
            });
            if(window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            delete allChats[id];
            localStorage.setItem('monster_chats', JSON.stringify(allChats));
            refreshHistoryList();
            newChat();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            const key = localStorage.getItem('or-api-key');
            if(!text || !key) return;

            appendUI('user', text);
            input.value = '';
            document.getElementById('status').innerText = "Monster is thinking...";

            const history = allChats[currentChatId]?.messages || [{role: 'system', content: localStorage.getItem('or-system')}];
            history.push({role: 'user', content: text});

            const bubble = createBubble('assistant');
            const contentDiv = bubble.querySelector('.prose');
            let fullText = "";

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ "model": localStorage.getItem('or-model'), "messages": history, "stream": true })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    chunk.split('\n').forEach(line => {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                fullText += data.choices[0].delta.content || "";
                                contentDiv.innerHTML = marked.parse(fullText);
                                Prism.highlightAllUnder(contentDiv);
                            } catch(e) {}
                        }
                    });
                    document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                }

                // Finalize Chat
                history.push({role: 'assistant', content: fullText});
                allChats[currentChatId] = { title: history[1].content.substring(0,25), messages: history };
                localStorage.setItem('monster_chats', JSON.stringify(allChats));
                refreshHistoryList();
                addCopyTrigger(bubble, fullText);

            } catch (err) {
                contentDiv.innerHTML = "Monster Error: " + err.message;
            } finally {
                document.getElementById('status').innerText = "Sleeping";
            }
        }

        function createBubble(role) {
            const div = document.createElement('div');
            div.className = `p-5 rounded-3xl max-w-[90%] md:max-w-[75%] ${role === 'user' ? 'bg-green-600 text-white self-end rounded-tr-none' : 'bg-slate-800 text-slate-100 self-start rounded-tl-none border border-slate-700'}`;
            div.innerHTML = `<small class="block text-[9px] uppercase font-black tracking-tighter opacity-50 mb-2">${role === 'user' ? 'YOU' : 'GREEN MONSTER'}</small><div class="prose"></div>`;
            document.getElementById('chat-window').appendChild(div);
            return div;
        }

        function appendUI(role, text) {
            const bubble = createBubble(role);
            bubble.querySelector('.prose').innerHTML = marked.parse(text);
            if(role === 'assistant') addCopyTrigger(bubble, text);
            Prism.highlightAllUnder(bubble);
        }

        function addCopyTrigger(bubble, text) {
            if(bubble.querySelector('.copy-trigger')) return;
            const btn = document.createElement('div');
            btn.className = 'copy-trigger';
            btn.innerHTML = `<span>📋</span> Copy Response`;
            btn.onclick = () => {
                navigator.clipboard.writeText(text);
                btn.innerHTML = `<span>✅</span> Copied!`;
                setTimeout(() => btn.innerHTML = `<span>📋</span> Copy Response`, 2000);
            };
            bubble.appendChild(btn);
        }
    </script>
</body>
</html>
