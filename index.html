<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBot | Universal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        .chat-container { height: calc(100vh - 160px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        pre { border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <header class="flex justify-between items-center p-4 border-b border-gray-800 bg-gray-900 sticky top-0 z-10">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Green Web Monster Chat Bot</h1>
        <button onclick="toggleSettings()" class="p-2 hover:bg-gray-800 rounded-full transition">
            ⚙️ <span class="hidden sm:inline">Settings</span>
        </button>
    </header>

    <main id="chat-window" class="chat-container overflow-y-auto p-4 space-y-4 flex flex-col">
        <div class="bg-gray-800 p-4 rounded-lg max-w-2xl border border-gray-700">
            Hello! Configure your <b>OpenRouter API Key</b> in settings to start chatting.
        </div>
    </main>

    <footer class="fixed bottom-0 w-full p-4 bg-gray-900 border-t border-gray-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Ask anything..." 
                   class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-medium transition">
                Send
            </button>
        </div>
    </footer>

    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-20">
        <div class="bg-gray-800 w-full max-w-md p-6 rounded-2xl border border-gray-700">
            <h2 class="text-xl font-bold mb-4">Configuration</h2>
            
            <label class="block text-sm text-gray-400 mb-1">OpenRouter API Key</label>
            <input type="password" id="api-key" placeholder="sk-or-v1-..." class="w-full bg-gray-900 border border-gray-700 rounded p-2 mb-4">

            <label class="block text-sm text-gray-400 mb-1">Model ID</label>
            <input type="text" id="model-id" value="google/gemini-2.0-flash-001" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mb-4">

            <label class="block text-sm text-gray-400 mb-1">System Prompt</label>
            <textarea id="system-prompt" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded p-2 mb-6">You are a helpful AI assistant.</textarea>

            <div class="flex gap-2">
                <button onclick="saveSettings()" class="flex-1 bg-green-600 p-2 rounded font-bold">Save Changes</button>
                <button onclick="toggleSettings()" class="flex-1 bg-gray-700 p-2 rounded">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        let messages = [];

        // Load Settings on Start
        window.onload = () => {
            document.getElementById('api-key').value = localStorage.getItem('or-api-key') || '';
            document.getElementById('model-id').value = localStorage.getItem('or-model') || 'google/gemini-2.0-flash-001';
            document.getElementById('system-prompt').value = localStorage.getItem('or-system') || 'You are a helpful AI assistant.';
        };

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function saveSettings() {
            localStorage.setItem('or-api-key', document.getElementById('api-key').value);
            localStorage.setItem('or-model', document.getElementById('model-id').value);
            localStorage.setItem('or-system', document.getElementById('system-prompt').value);
            alert("Settings saved locally!");
            toggleSettings();
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const key = localStorage.getItem('or-api-key');
            
            if(!input.value || !key) return alert("Check your API key and input!");

            const userText = input.value;
            appendMessage('user', userText);
            input.value = '';
            
            // Prepare messages for API
            if(messages.length === 0) {
                messages.push({role: "system", content: localStorage.getItem('or-system')});
            }
            messages.push({role: "user", content: userText});

            try {
                btn.disabled = true;
                btn.innerText = "Thinking...";

                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": localStorage.getItem('or-model'),
                        "messages": messages
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                
                appendMessage('assistant', aiText);
                messages.push({role: "assistant", content: aiText});
            } catch (err) {
                appendMessage('assistant', "Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Send";
            }
        }

        function appendMessage(role, text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `p-4 rounded-xl max-w-[85%] ${role === 'user' ? 'bg-blue-600 self-end' : 'bg-gray-800 border border-gray-700 self-start'}`;
            
            // Basic code block formatting for "clean" look
            const formattedText = text.replace(/```(\w+)?([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang || 'javascript'}">${code.trim()}</code></pre>`;
            });

            div.innerHTML = `<small class="block opacity-50 mb-1 text-xs uppercase">${role}</small><div>${formattedText}</div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
            Prism.highlightAll(); // Make code pretty
        }
    </script>
</body>
</html>
