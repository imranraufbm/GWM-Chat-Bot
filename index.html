<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GWM Chat Bot | Vision & History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root { --sidebar-width: 260px; }
        body { background: #0f172a; color: #f8fafc; overflow: hidden; }
        .main-layout { display: flex; height: 100vh; }
        #sidebar { width: var(--sidebar-width); background: #1e293b; transition: all 0.3s; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 2rem; scroll-behavior: smooth; }
        .prose h1, .prose h2 { color: #60a5fa; font-weight: bold; margin-bottom: 0.5rem; }
        .prose ul { list-style: disc; margin-left: 1.25rem; }
        pre { position: relative !important; padding-top: 2.5rem !important; border-radius: 12px !important; margin: 1rem 0 !important; border: 1px solid #475569 !important; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #475569; color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; border: none; z-index: 10; }
        .copy-btn:hover { background: #64748b; }
        .image-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #3b82f6; position: relative; }
        .hidden-sidebar { margin-left: calc(-1 * var(--sidebar-width)); }
        @media (max-width: 768px) { #sidebar { position: absolute; z-index: 50; height: 100%; } .hidden-sidebar { left: -100%; } }
    </style>
</head>
<body>

<div class="main-layout">
    <aside id="sidebar" class="hidden-sidebar md:flex">
        <div class="p-4 border-b border-slate-700">
            <button onclick="newChat()" class="w-full border border-slate-600 hover:bg-slate-700 p-2 rounded-lg transition text-sm flex items-center justify-center gap-2">
                <span>+</span> New Chat
            </button>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto p-2 space-y-1 text-sm text-slate-300">
            </div>
        <div class="p-4 border-t border-slate-700">
            <button onclick="toggleSettings()" class="w-full text-left p-2 hover:bg-slate-700 rounded transition text-xs">⚙️ Settings</button>
        </div>
    </aside>

    <div class="chat-area">
        <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-800 rounded">≡</button>
            <h1 class="font-bold text-blue-400">GWM Chat Bot</h1>
            <div id="status" class="text-xs text-slate-500 italic">Ready</div>
        </header>

        <div id="chat-window" class="space-y-6"></div>

        <footer class="p-4 bg-slate-900/80 border-t border-slate-800">
            <div class="max-w-4xl mx-auto">
                <div id="img-preview-container" class="flex gap-2 mb-2 hidden"></div>
                
                <div class="flex items-end gap-2 bg-slate-800 p-2 rounded-xl border border-slate-700">
                    <label class="p-2 cursor-pointer hover:bg-slate-700 rounded-lg transition" title="Upload Image">
                        📷
                        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleImage(this)">
                    </label>
                    <textarea id="user-input" rows="1" class="w-full bg-transparent border-none focus:outline-none p-2 resize-none max-h-40" placeholder="Ask anything (or upload an image)..."></textarea>
                    <button id="send-btn" onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 p-2 rounded-lg transition px-4 font-bold">Send</button>
                </div>
            </div>
        </footer>
    </div>
</div>

<div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
    <div class="bg-slate-800 w-full max-w-md p-6 rounded-2xl border border-slate-700 shadow-2xl">
        <h2 class="text-xl font-bold mb-4 text-blue-400">Advanced Settings</h2>
        <label class="text-xs text-slate-400 uppercase font-bold">OpenRouter API Key</label>
        <input type="password" id="api-key" class="w-full bg-slate-900 border border-slate-700 rounded p-3 mb-4 mt-1">
        
        <label class="text-xs text-slate-400 uppercase font-bold">Vision Model (e.g. google/gemini-2.0-flash-001)</label>
        <input type="text" id="model-id" class="w-full bg-slate-900 border border-slate-700 rounded p-3 mb-4 mt-1">

        <label class="text-xs text-slate-400 uppercase font-bold">System Personality</label>
        <textarea id="system-prompt" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded p-3 mb-6 mt-1 text-sm"></textarea>
        
        <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-bold transition">Save Configuration</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script>
    let currentChatId = Date.now();
    let chatHistory = JSON.parse(localStorage.getItem('mybot_history') || '[]');
    let currentImages = []; // Stores base64 images

    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('or-api-key') || '';
        document.getElementById('model-id').value = localStorage.getItem('or-model') || 'google/gemini-2.0-flash-001';
        document.getElementById('system-prompt').value = localStorage.getItem('or-system') || 'You are a helpful AI assistant.';
        renderHistory();
        newChat();
    };

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden-sidebar'); }
    function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
    
    function saveSettings() {
        localStorage.setItem('or-api-key', document.getElementById('api-key').value);
        localStorage.setItem('or-model', document.getElementById('model-id').value);
        localStorage.setItem('or-system', document.getElementById('system-prompt').value);
        toggleSettings();
    }

    function handleImage(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            currentImages.push(e.target.result);
            renderImagePreviews();
        };
        reader.readAsDataURL(file);
    }

    function renderImagePreviews() {
        const container = document.getElementById('img-preview-container');
        container.innerHTML = '';
        currentImages.forEach((img, i) => {
            container.innerHTML += `<div class="relative"><img src="${img}" class="image-preview"><button onclick="removeImg(${i})" class="absolute -top-2 -right-2 bg-red-600 rounded-full w-5 h-5 text-[10px]">X</button></div>`;
        });
        container.classList.toggle('hidden', currentImages.length === 0);
    }

    function removeImg(i) { currentImages.splice(i, 1); renderImagePreviews(); }

    function newChat() {
        currentChatId = Date.now();
        document.getElementById('chat-window').innerHTML = '';
        currentImages = [];
        renderImagePreviews();
        appendMessage('assistant', 'How can I help you today?');
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = chatHistory.slice().reverse().map(chat => `
            <div class="p-2 hover:bg-slate-700 rounded cursor-pointer truncate flex justify-between group" onclick="loadChat(${chat.id})">
                <span>${chat.title}</span>
            </div>
        `).join('');
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        const key = localStorage.getItem('or-api-key');
        if (!text && currentImages.length === 0) return;
        if (!key) return alert("Add your API Key in Settings!");

        appendMessage('user', text, currentImages);
        input.value = '';
        
        const bubble = createBubble('assistant');
        const contentDiv = bubble.querySelector('.prose');
        document.getElementById('status').innerText = "Typing...";

        // Construct payload with Vision support
        let userContent = [{ type: "text", text: text }];
        currentImages.forEach(img => {
            userContent.push({ type: "image_url", image_url: { url: img } });
        });

        const messages = [
            { role: "system", content: localStorage.getItem('or-system') },
            { role: "user", content: userContent }
        ];

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    "model": localStorage.getItem('or-model'),
                    "messages": messages,
                    "stream": true
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                chunk.split('\n').forEach(line => {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            fullText += data.choices[0].delta.content || "";
                            contentDiv.innerHTML = marked.parse(fullText);
                            Prism.highlightAllUnder(contentDiv);
                            addCopyButtons(contentDiv);
                            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                        } catch(e) {}
                    }
                });
            }
            saveToHistory(text || "Image Query");
            currentImages = [];
            renderImagePreviews();
        } catch (err) {
            contentDiv.innerHTML = "Error: " + err.message;
        } finally {
            document.getElementById('status').innerText = "Ready";
        }
    }

    function createBubble(role) {
        const div = document.createElement('div');
        div.className = `p-4 rounded-2xl max-w-[85%] ${role === 'user' ? 'bg-blue-600 self-end ml-auto' : 'bg-slate-800 border border-slate-700 self-start'}`;
        div.innerHTML = `<small class="block opacity-40 text-[10px] uppercase font-bold mb-1">${role}</small><div class="prose"></div>`;
        document.getElementById('chat-window').appendChild(div);
        return div;
    }

    function appendMessage(role, text, imgs = []) {
        const bubble = createBubble(role);
        let imgHtml = imgs.map(i => `<img src="${i}" class="max-w-xs rounded-lg mb-2">`).join('');
        bubble.querySelector('.prose').innerHTML = imgHtml + marked.parse(text || "");
        Prism.highlightAllUnder(bubble);
        addCopyButtons(bubble);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function addCopyButtons(container) {
        container.querySelectorAll('pre').forEach(pre => {
            if (pre.querySelector('.copy-btn')) return;
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerText = 'Copy';
            btn.onclick = () => {
                navigator.clipboard.writeText(pre.innerText.replace('Copy', ''));
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = 'Copy', 2000);
            };
            pre.appendChild(btn);
        });
    }

    function saveToHistory(title) {
        if (!chatHistory.find(c => c.id === currentChatId)) {
            chatHistory.push({ id: currentChatId, title: title.substring(0, 30) });
            localStorage.setItem('mybot_history', JSON.stringify(chatHistory));
            renderHistory();
        }
    }
</script>
</body>
</html>
